name: D Release OpenClover

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release version'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: 'openclover-${{ inputs.releaseVersion }}'

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.ARTIFACT_SIGNING_GPG_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Prepare third party libraries
        run: |
          mvn --batch-mode install -Pworkspace-setup -f clover-core-libs/pom.xml

      - name: Download KTreemap fork
        run: |
          wget https://packages.atlassian.com/mvn/maven-atlassian-external/net/sf/jtreemap/ktreemap/1.1.0-atlassian-01/ktreemap-1.1.0-atlassian-01.jar
          wget https://packages.atlassian.com/mvn/maven-atlassian-external/net/sf/jtreemap/ktreemap/1.1.0-atlassian-01/ktreemap-1.1.0-atlassian-01.pom
          mvn --batch-mode install:install-file -Dfile=ktreemap-1.1.0-atlassian-01.jar -DpomFile=ktreemap-1.1.0-atlassian-01.pom

      - name: Set up Eclipse JAR signing keystore
        run: |
          mkdir -p ~/.openclover
          echo "${{ secrets.ECLIPSE_KEYSTORE_JKS_BASE64 }}" | base64 --decode > ~/.openclover/openclover.jks

      - name: Publish a release
        run: |
          mvn --batch-mode deploy -Dgpg.skip=false -DskipTests=true \
            -Dclover.jarsigner.skip=false \
            -Dclover.keystore.storepass=${{ secrets.ECLIPSE_KEYSTORE_STOREPASS }} \
            -Dclover.keystore.keypass=${{ secrets.ECLIPSE_KEYSTORE_KEYPASS }}
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.ARTIFACT_SIGNING_GPG_PASSPHRASE }}

      # Must run in this job: the staging API only accepts the promotion
      # request from the IP that uploaded the artifacts.
      - name: Publish staging repository to Central Portal
        run: |
          curl -sS -f -X POST \
            -H "Authorization: Bearer $(printf '%s:%s' "$MAVEN_USERNAME" "$MAVEN_PASSWORD" | base64 -w0)" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/org.openclover"
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}

      - name: Upload non-Maven artifacts
        run: |
          SSH_ID=id_ed25519
          echo "${{ secrets.sshKey }}" > $SSH_ID
          chmod 400 $SSH_ID
          mkdir ~/.ssh
          echo "[$OPENCLOVER_ORG_HOST]:$SSH_PORT ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDIQZaqssRl7Aifv3rJ28FzCgu0CTUPX4Jo0f1R/Xpru" >> ~/.ssh/known_hosts
          echo "Uploading ant javadocs to openclover.org"
          scp -i $SSH_ID -P $SSH_PORT clover-ant/target/clover-ant-$VERSION-javadoc.jar $SSH_USERNAME@$OPENCLOVER_ORG_HOST:$OPENCLOVER_ORG_DOC_PATH/javadoc
          ssh -i $SSH_ID -p $SSH_PORT $SSH_USERNAME@$OPENCLOVER_ORG_HOST "cd $OPENCLOVER_ORG_DOC_PATH/javadoc && rm -rf latest && unzip -o clover-ant-$VERSION-javadoc.jar -d $VERSION && unzip -o clover-ant-$VERSION-javadoc.jar -d latest && rm clover-ant-$VERSION-javadoc.jar"
          echo "Uploading Ant zip to openclover.org"
          scp -i $SSH_ID -P $SSH_PORT clover-ant-zip/target/clover-ant-$VERSION.zip $SSH_USERNAME@$OPENCLOVER_ORG_HOST:$OPENCLOVER_ORG_DOWNLOAD_PATH
          echo "Uploading IDEA jar and latestStableVersion.xml to openclover.org"
          scp -i $SSH_ID -P $SSH_PORT clover-idea/build/dist/clover-idea-$VERSION.jar $SSH_USERNAME@$OPENCLOVER_ORG_HOST:$OPENCLOVER_ORG_DOWNLOAD_PATH
          scp -i $SSH_ID -P $SSH_PORT clover-idea/build/autoupdate/latestStableVersion.xml $SSH_USERNAME@$OPENCLOVER_ORG_HOST:$OPENCLOVER_ORG_UPDATE_PATH
          echo "Uploading Eclipse p2 update site to openclover.org"
          ECLIPSE_VERSION=`echo $VERSION | cut -f 1 -d '-'`.v`date +%Y%m%d`000000
          # 1) Keep offering the archived update site as a downloadable zip (unchanged)
          scp -i $SSH_ID -P $SSH_PORT clover-eclipse/org.openclover.eclipse.updatesite/target/clover-eclipse-site-$ECLIPSE_VERSION.zip $SSH_USERNAME@$OPENCLOVER_ORG_HOST:$OPENCLOVER_ORG_DOWNLOAD_PATH/org.openclover.eclipse.updatesite_$ECLIPSE_VERSION.zip
          # 2) Publish the p2 repository into its own per-version subdir under update/p2/
          #    and (re)generate the composite so the single URL update/p2/ aggregates
          #    every published p2 version. The old flat site (update/site.xml, update/plugins,
          #    update/features) is left untouched and keeps serving legacy clients.
          ssh -i $SSH_ID -p $SSH_PORT $SSH_USERNAME@$OPENCLOVER_ORG_HOST \
            "P2_PATH='$OPENCLOVER_ORG_UPDATE_PATH/p2' NEWVER='$ECLIPSE_VERSION' ZIP='$OPENCLOVER_ORG_DOWNLOAD_PATH/org.openclover.eclipse.updatesite_$ECLIPSE_VERSION.zip' bash -s" <<'REMOTE'
          set -e
          mkdir -p "$P2_PATH/$NEWVER"
          unzip -o "$ZIP" -d "$P2_PATH/$NEWVER"
          cd "$P2_PATH"
          TS="$(date +%s)000"
          CHILDREN="$(ls -d */ 2>/dev/null | sed 's#/##')"
          N="$(printf '%s\n' $CHILDREN | grep -c .)"
          write_composite() {
            REPO_TYPE="$1"; PROC_INSTR="$2"; OUT="$3"
            {
              echo "<?xml version='1.0' encoding='UTF-8'?>"
              echo "<?$PROC_INSTR version='1.0.0'?>"
              echo "<repository name='OpenClover Update Site' type='$REPO_TYPE' version='1.0.0'>"
              echo "  <properties size='1'><property name='p2.timestamp' value='$TS'/></properties>"
              echo "  <children size='$N'>"
              for c in $CHILDREN; do echo "    <child location='$c'/>"; done
              echo "  </children>"
              echo "</repository>"
            } > "$OUT"
          }
          write_composite 'org.eclipse.equinox.internal.p2.metadata.repository.CompositeMetadataRepository' 'compositeMetadataRepository' compositeContent.xml
          write_composite 'org.eclipse.equinox.internal.p2.artifact.repository.CompositeArtifactRepository' 'compositeArtifactRepository' compositeArtifacts.xml
          REMOTE
          rm -f $SSH_ID
        env:
          SSH_PORT: ${{ secrets.sshPort }}
          SSH_USERNAME: ${{ secrets.sshUsername }}
          OPENCLOVER_ORG_HOST: ${{ secrets.sshHost }}
          OPENCLOVER_ORG_DOWNLOAD_PATH: ${{ secrets.sshDomainPath }}/download/openclover
          OPENCLOVER_ORG_UPDATE_PATH: ${{ secrets.sshDomainPath }}/update
          OPENCLOVER_ORG_DOC_PATH: ${{ secrets.sshDomainPath }}/doc
          VERSION: ${{ inputs.releaseVersion }}
