name: B IDEA Compatibility Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    name: IDEA ${{ matrix.idea-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - idea-version: "2016.3.8"
            idea-libs-tag: "2016.3.163155298"
            idea-build: "163.15529.8"
            jdk-version: 8
          - idea-version: "2017.3.7"
            idea-libs-tag: "2017.3.173471011"
            idea-build: "173.4710.11"
            jdk-version: 8
          - idea-version: "2018.3.6"
            idea-libs-tag: "2018.3.183615611"
            idea-build: "183.6156.11"
            jdk-version: 8

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK ${{ matrix.jdk-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.jdk-version }}
          distribution: temurin
          cache: maven

      - name: Cache IDEA ${{ matrix.idea-version }} binaries
        uses: actions/cache@v6
        with:
          path: clover-idea-libs/target/download
          key: ${{ runner.os }}-idea-${{ matrix.idea-build }}

      - name: Prepare third party libraries
        run: |
          mvn --batch-mode install -Pworkspace-setup -f clover-core-libs/pom.xml

      - name: Prepare IDEA ${{ matrix.idea-version }} libs
        run: |
          git show clover-idea-libs-${{ matrix.idea-libs-tag }}:clover-idea-libs/pom.xml \
            > clover-idea-libs/pom.xml
          git show clover-idea-libs-${{ matrix.idea-libs-tag }}:clover-idea-libs/clover-idea-all/pom.xml \
            > clover-idea-libs/clover-idea-all/pom.xml
          mvn --batch-mode install -Pworkspace-setup -f clover-idea-libs/pom.xml

      - name: Build all modules
        run: |
          mvn --batch-mode install -DskipTests=true \
            -Didea.version=${{ matrix.idea-build }} \
            -Didea.version.short=${{ matrix.idea-version }}

      - name: Test clover-idea against IDEA ${{ matrix.idea-version }}
        run: |
          mvn --batch-mode test -pl clover-idea \
            -Didea.version=${{ matrix.idea-build }} \
            -Didea.version.short=${{ matrix.idea-version }}

      - name: Upload test results for IDEA ${{ matrix.idea-version }}
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-idea-${{ matrix.idea-version }}
          path: clover-idea/target/surefire-reports/*.xml
          if-no-files-found: warn
