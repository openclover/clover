name: B IDEA Compatibility Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    name: IDEA ${{ matrix.idea-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - idea-version: "2024.3.7.1"
            idea-build: "243.28141.41"
          - idea-version: "2025.3.6"
            idea-build: "253.33813.25"
          - idea-version: "2026.1.3"
            idea-build: "261.25134.95"

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Cache Gradle IntelliJ Platform downloads
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-idea-${{ matrix.idea-build }}-${{ hashFiles('clover-idea/build.gradle.kts', 'clover-idea/settings.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-idea-${{ matrix.idea-build }}-

      - name: Prepare third party libraries
        run: |
          mvn --batch-mode install -Pworkspace-setup -f clover-core-libs/pom.xml

      - name: Build all modules
        run: |
          mvn --batch-mode install -DskipTests=true -P!eclipse-jdk21plus \
            -Didea.version.short=${{ matrix.idea-version }}

      - name: Test clover-idea against IDEA ${{ matrix.idea-version }}
        run: |
          mvn --batch-mode test -pl clover-idea \
            -Didea.version.short=${{ matrix.idea-version }}

      - name: Upload test results for IDEA ${{ matrix.idea-version }}
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-idea-${{ matrix.idea-version }}
          path: clover-idea/build/test-results/test/*.xml
          if-no-files-found: warn
