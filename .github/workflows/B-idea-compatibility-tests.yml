name: B IDEA Compatibility Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    name: IDEA ${{ matrix.idea-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - idea-version: "2024.3.7.1"
            idea-build: "243.28141.41"
            idea-download-file: "ideaIC-2024.3.7.1.tar.gz"
            idea-download-dir: "idea-IC-243.28141.41"
            jdk-version: 21
          - idea-version: "2025.3.6"
            idea-build: "253.33813.25"
            idea-download-file: "idea-2025.3.6.tar.gz"
            idea-download-dir: "idea-IU-253.33813.25"
            jdk-version: 21
          - idea-version: "2026.1.3"
            idea-build: "261.25134.95"
            idea-download-file: "idea-2026.1.3.tar.gz"
            idea-download-dir: "idea-IU-261.25134.95"
            jdk-version: 21

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.jdk-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.jdk-version }}
          distribution: temurin
          cache: maven

      - name: Cache IDEA ${{ matrix.idea-version }} binaries
        uses: actions/cache@v6
        with:
          path: clover-idea-libs/target/download
          key: ${{ runner.os }}-idea-${{ matrix.idea-build }}

      - name: Prepare third party libraries
        run: |
          mvn --batch-mode install -Pworkspace-setup -f clover-core-libs/pom.xml

      - name: Prepare IDEA ${{ matrix.idea-version }} libs
        run: |
          mvn --batch-mode install -Pworkspace-setup -f clover-idea-libs/pom.xml \
            -Didea.version=${{ matrix.idea-build }} \
            -Didea.download.file=${{ matrix.idea-download-file }} \
            -Didea.download.dir=${{ matrix.idea-download-dir }}

      - name: Build all modules
        run: |
          mvn --batch-mode install -DskipTests=true \
            -Didea.version=${{ matrix.idea-build }} \
            -Didea.version.short=${{ matrix.idea-version }}

      - name: Test clover-idea against IDEA ${{ matrix.idea-version }}
        run: |
          mvn --batch-mode test -pl clover-idea \
            -Didea.version=${{ matrix.idea-build }} \
            -Didea.version.short=${{ matrix.idea-version }}

      - name: Upload test results for IDEA ${{ matrix.idea-version }}
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-idea-${{ matrix.idea-version }}
          path: clover-idea/target/surefire-reports/*.xml
          if-no-files-found: warn
