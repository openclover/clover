name: A Build and test on JDK8

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 1.8
        uses: actions/setup-java@v5
        with:
          java-version: 8.0
          distribution: temurin
          cache: maven

      - name: Prepare third party libraries
        run: |
          mvn -ntp --batch-mode install -Pworkspace-setup -f clover-core-libs/pom.xml

      - name: Download KTreemap fork
        run: |
          wget https://packages.atlassian.com/mvn/maven-atlassian-external/net/sf/jtreemap/ktreemap/1.1.0-atlassian-01/ktreemap-1.1.0-atlassian-01.jar
          wget https://packages.atlassian.com/mvn/maven-atlassian-external/net/sf/jtreemap/ktreemap/1.1.0-atlassian-01/ktreemap-1.1.0-atlassian-01.pom
          mvn -ntp --batch-mode install:install-file -Dfile=ktreemap-1.1.0-atlassian-01.jar -DpomFile=ktreemap-1.1.0-atlassian-01.pom

      - name: Compile and pack all modules
        run: |
          mvn -ntp --batch-mode install -DskipTests=true

      - name: Run tests for runtime, core, groovy, ant
        run: |
          mvn -ntp --batch-mode verify -pl clover-runtime,clover-core,clover-groovy,clover-ant

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-jdk8
          path: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml
          if-no-files-found: ignore
